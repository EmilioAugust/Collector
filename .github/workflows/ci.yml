name: Run Tests for Backend
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Create test environment file
        run: |
          cat > backend/.test.env << 'EOF'
          ${{ secrets.TEST_ENV_CONTENTS }}
          EOF
      
      - name: Run Tests
        run: |
          cd backend
          set -a
          source backend/.test.env
          set +a
          pytest -v --tb=short
      
      - name: Debug directory structure (опционально)
        if: failure()
        run: |
          echo "Current directory: $(pwd)"
          echo "Backend directory contents:"
          ls -la backend/ || echo "backend folder not found"
          echo "Tests directory:"
          ls -la backend/tests/ || echo "tests folder not found"